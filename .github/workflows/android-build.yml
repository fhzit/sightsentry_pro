name: Android CI Build

"on":
  push:
    branches: [ main ]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Android SDK root
        run: |
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/Android/Sdk" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Android commandline tools and SDK packages
        run: |
          set -e
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -L -o /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/commandlinetools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
          # accept licenses and update
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --update || true

          # install core packages (omit fixed NDK version to avoid unavailable-package errors)
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0" "platforms;android-28"

          # try to detect and install the latest available NDK package (if any)
          NDK_PKG=$($ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list 2>/dev/null | grep -oE 'ndk;[0-9]+\.[0-9]+\.[0-9]+' | sort -Vu | tail -n1 || true)
          if [ -n "$NDK_PKG" ]; then
            echo "Installing NDK package: $NDK_PKG"
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "$NDK_PKG" || true
          else
            echo "No NDK package found in sdkmanager list; skipping NDK install"
          fi

      - name: Add Android tools to PATH
        run: |
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Generate local.properties for Android build
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > src-tauri/local.properties

      - name: Restore keystore (if provided)
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "No keystore secret provided; skipping keystore restore"
          else
            echo "Restoring keystore"
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/release.keystore
          fi

      - name: Export signing env (if keystore restored)
        run: |
          if [ -f src-tauri/release.keystore ]; then
            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/src-tauri/release.keystore" >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Keystore not found; skipping export of signing env vars"
          fi

      - name: Install Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Install npm dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Build Android APK (Gradle)
        working-directory: src-tauri
        run: |
          set -e
          gradle --version
          gradle assembleRelease --no-daemon -Porg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/**/build/outputs/**/*.apk
