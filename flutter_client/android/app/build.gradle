plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def releaseStoreFilePath = keystoreProperties["storeFile"] ?: System.getenv("RELEASE_STORE_FILE")
def releaseStorePassword = keystoreProperties["storePassword"] ?: System.getenv("RELEASE_STORE_PASSWORD")
def releaseKeyAlias = keystoreProperties["keyAlias"] ?: System.getenv("RELEASE_KEY_ALIAS")
def releaseKeyPassword = keystoreProperties["keyPassword"] ?: System.getenv("RELEASE_KEY_PASSWORD")
def hasReleaseSigning = releaseStoreFilePath && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "com.sightsentry.pro"
    compileSdk 36

    defaultConfig {
        applicationId "com.sightsentry.pro"
        minSdk 28
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile rootProject.file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}
