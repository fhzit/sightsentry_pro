<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightSentry Pro - 信号嗅探定位系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>SightSentry Pro</h1>
            <div class="header-actions">
                <button id="themeToggle" title="切换主题">🌓</button>
                <button id="settingsBtn" title="设置">⚙️</button>
            </div>
        </header>

        <div class="status-panel">
            <div class="status-item">
                <span class="label">已连接节点</span>
                <span class="value" id="nodeCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">在线设备</span>
                <span class="value" id="deviceCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">WiFi设备</span>
                <span class="value" id="wifiCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">BLE设备</span>
                <span class="value" id="bleCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">连接状态</span>
                <span class="value" id="connectionStatus">未连接</span>
            </div>
        </div>

        <div class="connection-panel">
            <div class="connection-group">
                <h3>📡 连接方式</h3>
                <div class="connection-buttons">
                    <button id="serialBtn" class="connect-btn">🔌 USB串口连接</button>
                    <button id="bleBtn" class="connect-btn">📶 蓝牙连接</button>
                    <button id="disconnectBtn" class="disconnect-btn" style="display:none;">断开连接</button>
                </div>
                <div class="connection-extra">
                    <label><input type="checkbox" id="autoReconnect"> 自动重连</label>
                    <div class="serial-select-row">
                        <select id="serialPortSelect">
                            <option value="">-- 选择串口 --</option>
                        </select>
                        <button id="refreshPortsBtn" class="small-btn">刷新串口</button>
                    </div>
                </div>
                <div class="ble-nodes">
                    <h4>已连接节点</h4>
                    <div id="bleNodes" class="ble-nodes-list"></div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="device-list-container">
                <h2>📱 设备列表 <span id="deviceTotal">(0)</span></h2>
                <div class="device-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="WIFI">WiFi</button>
                    <button class="filter-btn" data-filter="BLE">BLE</button>
                </div>
                <div id="deviceList" class="device-list"></div>
            </div>
        </div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>⚙️ 设置</h2>
                <div class="settings-group">
                    <label>距离计算参数 (n)</label>
                    <input type="number" id="distanceParam" value="2.5" step="0.1" min="1" max="5">
                </div>
                <div class="settings-group">
                    <label>1米处RSSI (dBm)</label>
                    <input type="number" id="rssiAt1m" value="-59" step="1">
                </div>
                <div class="settings-group">
                    <label>设备超时时间 (秒)</label>
                    <input type="number" id="timeoutSec" value="30" step="5" min="10">
                </div>
                <div class="settings-group">
                    <label>刷新频率 (毫秒)</label>
                    <input type="number" id="refreshRate" value="1000" step="100" min="200">
                </div>
                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="showDebug">
                        显示调试日志
                    </label>
                </div>
                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="enableDeviceFilter" checked>
                        仅显示手机/平板 BLE 设备
                    </label>
                </div>
                <div class="settings-actions">
                    <button id="saveSettings" class="save-btn">保存设置</button>
                    <button id="resetSettings" class="reset-btn">重置默认</button>
                </div>
            </div>
        </div>

        <div id="debugPanel" class="debug-panel" style="display:none;">
            <h3>📋 调试日志 <button id="clearLog">清空</button></h3>
            <div id="debugLog"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
